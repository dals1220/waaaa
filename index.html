<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Wasang Ponger :p</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Playpen+Sans:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Pacifico', 'Playpen Sans', cursive, sans-serif; /* Applied cursive engine */
            overflow: hidden;
            background-color: #1a1a1a;
            color: #ffffff;
            position: relative;
        }
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none !important; 
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            padding: 40px 20px;
            background-color: #1a1a1a;
        }
        .active {
            display: flex !important; 
        }
        
        /* Universal Word Size & Cursive Layout Adjustments */
        h1, p {
            font-size: calc(2.2rem + 1.8vw); 
            font-weight: normal; /* Pacifico looks best at normal weight */
            text-shadow: 2px 2px 14px rgba(0, 0, 0, 0.95);
            max-width: 90%;
            pointer-events: none;
            letter-spacing: 0.5px;
            color: #ffffff;
            z-index: 5;
            line-height: 1.4;
            padding: 10px 0;
        }
        
        button {
            font-family: 'Playpen Sans', sans-serif; /* Keeping button text clear but stylized */
            padding: 16px 55px; 
            font-size: 1.4rem;
            font-weight: 700;
            cursor: pointer !important;
            border: none;
            border-radius: 35px;
            background-color: #ffffff !important;
            color: #000000 !important;
            box-shadow: 0 5px 25px rgba(0,0,0,0.6);
            transition: transform 0.1s, background-color 0.2s;
            z-index: 9999 !important; 
            pointer-events: auto !important;
            margin-bottom: 10px;
        }
        button:hover {
            transform: scale(1.05);
            background-color: #f0f0f0 !important;
        }

        /* Polaroid Gallery Configs */
        .polaroid-gallery {
            display: flex;
            gap: 25px; 
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            margin: 15px 0;
            pointer-events: none;
            width: 100%;
            z-index: 4;
        }
        .polaroid {
            background: white;
            padding: 15px 15px 30px 15px; 
            box-shadow: 0 12px 30px rgba(0,0,0,0.6);
            border-radius: 4px;
            transform: rotate(var(--r));
            opacity: 0;
        }
        
        .polaroid img {
            width: 230px;  
            height: 200px; 
            object-fit: cover;
            display: block;
            border: 1px solid #ddd;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .polaroid img {
                width: 150px;
                height: 130px;
            }
            .polaroid {
                padding: 10px 10px 22px 10px;
            }
            h1, p {
                font-size: calc(1.6rem + 1.8vw); 
                line-height: 1.3;
            }
        }

        .neon-glow {
            color: #fff;
            text-shadow: 0 0 5px #fff, 0 0 10px #ff4757, 0 0 20px #ff4757;
            animation: pulseGlow 2s infinite alternate;
        }
        @keyframes pulseGlow {
            from { text-shadow: 0 0 5px #fff, 0 0 10px #ff4757, 0 0 20px #ff4757; }
            to { text-shadow: 0 0 10px #fff, 0 0 20px #ff6b81, 0 0 35px #ff6b81; }
        }

        /* Firework Sparkle Elements */
        .firework-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 999;
            animation: explode 1s cubic-bezier(0.05, 0.8, 0.1, 1) forwards;
        }
        @keyframes explode {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        .snowflake {
            position: absolute;
            top: -10px;
            color: #fff;
            pointer-events: none;
            z-index: 5;
            animation: fall linear forwards;
        }
        @keyframes fall { to { transform: translateY(105vh) translateX(30px); } }

        .pop-in { animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.25) forwards !important; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.6) rotate(var(--r, 0deg)); } to { opacity: 1; transform: scale(1) rotate(var(--r, 0deg)); } }
        
        .fade-in { animation: fadeIn 1.2s ease-in-out forwards !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <audio id="music1" src="music.mp3" loop preload="auto"></audio>
    <audio id="music2" src="music2.mp3" loop preload="auto"></audio>

    <div id="page1" class="page active" style="background-image: url('background.png'); justify-content: center;">
        <h1 class="fade-in" style="margin-bottom: 40px;">To Wasang Ponger: before u go i wana give u a little surprise :p press when ur readyy</h1>
        <button id="enterBtn1">enter</button>
    </div>

    <div id="page2" class="page" style="background-image: url('background.png');">
        <h1 class="fade-in">a trip down memory laneee</h1>
        <div class="polaroid-gallery">
            <div class="polaroid" id="pol1" style="--r: -6deg;">
                <img src="brawlstar1.png" alt="Brawl 1" onerror="this.src=''">
            </div>
            <div class="polaroid" id="pol2" style="--r: 4deg;">
                <img src="brawlstar2.png" alt="Brawl 2" onerror="this.src=''">
            </div>
            <div class="polaroid" id="pol3" style="--r: -3deg;">
                <img src="game.png" alt="Game" onerror="this.src=''">
            </div>
        </div>
        <h1 id="p2-subtext" style="opacity: 0; font-size: calc(1.5rem + 1.5vw); font-family: 'Playpen Sans', sans-serif;">I had so much fun brawl clutching and make music tgt!!</h1>
        <button id="enterBtn2" style="display: none;">enter</button>
    </div>

    <div id="page3" class="page" style="background-image: url('flower1.png'); justify-content: center; gap: 25px;">
        <h1 class="fade-in neon-glow">Are u ready for biligual dalgggi!!!</h1>
        <img src="cry.png" alt="cry emoji" onerror="this.style.display='none'" style="max-height: 180px; width: auto; object-fit: contain; z-index: 4; pointer-events: none;">
        <button id="enterBtn3">enter</button>
    </div>

    <div id="page4" class="page" style="background-image: url('letter.png'); justify-content: flex-end; cursor: pointer;">
        <p style="font-size: calc(1.4rem + 1vw); text-shadow: 2px 2px 5px #000; opacity: 0.8; margin-bottom: 20px; font-family: 'Playpen Sans', sans-serif;">(tap screen to continue)</p>
    </div>

    <div id="page5" class="page" style="background-image: url('cat.png'); justify-content: center; gap: 30px;">
        <button id="burstBtn">click!!!</button>
        <button id="enterBtn5" style="display: none;">enter</button>
    </div>

    <div id="page6" class="page" style="background-image: url('kesh.png'); justify-content: center;">
        <h1 class="fade-in" style="animation-duration: 3s !important;">I wish all the best for you!!! see you soon:&gt; -dalgs</h1>
    </div>

    <script>
        let currentPage = 1;
        const totalPages = 6;

        function nextPage() {
            if (currentPage >= totalPages) return;
            
            const currentEl = document.getElementById(`page${currentPage}`);
            if (currentEl) currentEl.classList.remove('active');
            
            currentPage++;
            
            const nextEl = document.getElementById(`page${currentPage}`);
            if (nextEl) nextEl.classList.add('active');

            try {
                if (currentPage === 2) {
                    const m1 = document.getElementById('music1');
                    if (m1) m1.play().catch(e => console.log("Audio block bypassed"));
                    triggerPolaroids();
                }
                if (currentPage === 6) {
                    const m1 = document.getElementById('music1');
                    const m2 = document.getElementById('music2');
                    if (m1) m1.pause();
                    if (m2) { m2.volume = 0.4; m2.play().catch(e => console.log("Audio 2 block bypassed")); }
                    startSnowstorm();
                }
            } catch(err) {
                console.log("Safe catch running:", err);
            }
        }

        // Bindings
        const binds = [
            { id: 'enterBtn1', action: nextPage },
            { id: 'enterBtn2', action: nextPage },
            { id: 'enterBtn3', action: nextPage },
            { id: 'page4', action: nextPage },
            { id: 'enterBtn5', action: nextPage }
        ];

        binds.forEach(bind => {
            const el = document.getElementById(bind.id);
            if (el) {
                el.addEventListener('click', bind.action);
                el.addEventListener('touchstart', (e) => {
                    e.preventDefault(); 
                    bind.action();
                }, { passive: false });
            }
        });

        // Polaroid Popups
        function triggerPolaroids() {
            setTimeout(() => { document.getElementById('pol1')?.classList.add('pop-in'); }, 300);
            setTimeout(() => { document.getElementById('pol2')?.classList.add('pop-in'); }, 800);
            setTimeout(() => { document.getElementById('pol3')?.classList.add('pop-in'); }, 1300);
            
            setTimeout(() => { 
                document.getElementById('p2-subtext')?.classList.add('fade-in');
            }, 1900);

            setTimeout(() => { 
                const btn2 = document.getElementById('enterBtn2');
                if (btn2) {
                    btn2.style.setProperty('display', 'block', 'important');
                    btn2.classList.add('fade-in');
                }
            }, 2700);
        }

        // Upgraded Vivid Firework System
        const burstBtn = document.getElementById('burstBtn');
        if (burstBtn) {
            const burstAction = () => {
                const rect = burstBtn.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                
                // Color palette for the firework explosion
                const colors = ['#FF4757', '#FF6B81', '#FFA502', '#2ED573', '#1E90FF', '#ECCC68', '#FFFFFF'];

                // Launch 45 dynamic firework particles outwards
                for(let i = 0; i < 45; i++) {
                    const p = document.createElement('div');
                    p.classList.add('firework-particle');
                    
                    // Assign random firework color
                    p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    p.style.left = centerX + 'px';
                    p.style.top = centerY + 'px';
                    
                    // Generate full 360-degree radial blast velocities
                    const angle = Math.random() * Math.PI * 2;
                    const blastDistance = Math.random() * 220 + 80; 
                    
                    p.style.setProperty('--tx', Math.cos(angle) * blastDistance + 'px');
                    p.style.setProperty('--ty', Math.sin(angle) * blastDistance + 'px');
                    
                    // Varied sparkle sizes
                    const size = Math.random() * 8 + 4;
                    p.style.width = size + 'px';
                    p.style.height = size + 'px';

                    document.body.appendChild(p);
                    setTimeout(() => p.remove(), 1000);
                }

                setTimeout(() => {
                    const e5 = document.getElementById('enterBtn5');
                    if(e5 && e5.style.display !== 'block') {
                        e5.style.setProperty('display', 'block', 'important');
                        e5.classList.add('fade-in');
                    }
                }, 200);
            };

            burstBtn.addEventListener('click', burstAction);
            burstBtn.addEventListener('touchstart', (e) => { e.preventDefault(); burstAction(); });
        }

        // Snow Machine
        function startSnowstorm() {
            const page6 = document.getElementById('page6');
            if (!page6) return;
            setInterval(() => {
                if (currentPage !== 6) return;
                const snowflake = document.createElement('div');
                snowflake.classList.add('snowflake');
                snowflake.innerHTML = '❄';
                snowflake.style.left = Math.random() * 100 + 'vw';
                snowflake.style.animationDuration = Math.random() * 2.5 + 1.5 + 's';
                snowflake.style.opacity = Math.random() * 0.7 + 0.3;
                snowflake.style.fontSize = Math.random() * 12 + 8 + 'px';
                
                page6.appendChild(snowflake);
                setTimeout(() => snowflake.remove(), 4000);
            }, 60);
        }
    </script>
</body>
</html>
