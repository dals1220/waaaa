<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Wasang Ponger :p</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Caveat', cursive, sans-serif;
            overflow: hidden;
            background-color: #000;
            color: #fff;
            position: relative;
        }
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            padding: 20px;
            z-index: 2; /* Keeps text above background floats */
        }
        .active {
            display: flex;
        }
        h1, p {
            font-size: 3.5rem; 
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
            max-width: 80%;
            pointer-events: none;
            letter-spacing: 1px;
        }
        button {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 12px 35px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 30px;
            background-color: #ffffff;
            color: #000000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s, background-color 0.2s;
            z-index: 10;
            margin-top: 20px;
        }
        button:hover {
            transform: scale(1.05);
            background-color: #e0e0e0;
        }
        .img-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
            pointer-events: none;
        }
        .img-container img {
            max-height: 180px;
            object-fit: contain;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            opacity: 0; 
        }
        
        /* Floating Elements Container */
        #floating-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
            z-index: 1; /* Sits behind text, in front of background */
        }

        /* Float Animations */
        .floater {
            position: absolute;
            bottom: -50px;
            pointer-events: none;
            animation: floatUp linear forwards;
        }
        
        /* Emoji specific styling */
        .floater-emoji {
            font-size: 24px; /* Keeps them small and cute */
        }

        /* Memoji image specific styling */
        .floater-memoji {
            width: 45px; /* Sized perfectly to blend with emojis */
            height: 45px;
            object-fit: contain;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-110vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Sequential pop up animations */
        .pop-in {
            animation: popInEffect 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popInEffect {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }

        .fade-in {
            animation: fadeInEffect 1s ease-in-out forwards;
        }
        @keyframes fadeInEffect {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Snowflake Animation for Page 5 */
        .snowflake {
            position: absolute;
            top: -10px;
            color: #fff;
            font-size: 1em;
