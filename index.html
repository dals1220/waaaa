<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Wasang Ponger :p</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Caveat', cursive, sans-serif;
            overflow: hidden;
            background-color: #000;
            color: #fff;
            position: relative;
        }
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: space-between; /* Keeps things separated vertically */
            align-items: center;
            text-align: center;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            padding: 40px 20px;
        }
        .active {
            display: flex;
        }
        h1, p {
            font-size: 3.5rem; 
            font-weight: bold;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
            max-width: 85%;
            pointer-events: none;
            letter-spacing: 1px;
        }
        
        /* Universal Styled Buttons */
        button {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 12px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 30px;
            background-color: #ffffff;
            color: #000000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
            z-index: 10;
        }
        button:hover {
            transform: scale(1.05);
            background-color: #e0e0e0;
            box-shadow: 0 6px 25px rgba(255,255,255,0.2);
        }

        /* Aesthetic Vinyl Record Icon */
        .vinyl-container {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 20;
            cursor: pointer;
            background: rgba(0,0,0,0.4);
            padding: 10px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed rgba(255,255,255,0.3);
        }
        .vinyl-record {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(45deg, #111, #333, #111);
            border: 3px solid #000;
            box-shadow: inset 0 0 10px #000, 0 4px 10px rgba(0,0,0,0.5);
            position: relative;
        }
        /* Center sticker of vinyl */
        .vinyl-record::after {
            content: '';
            position: absolute;
            top: 35%; left: 35%; width: 30%; height: 30%;
            background: #ff4757;
            border-radius: 50%;
        }
        .spinning {
            animation: spin 3s linear infinite;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* Polaroid Gallery Layout */
        .polaroid-gallery {
            display: flex;
            gap: 25px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            margin: 10px 0;
            pointer-events: none;
            width: 100%;
        }
        .polaroid {
            background: white;
            padding: 12px 12px 25px 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            border-radius: 2px;
            transform: rotate(var(--r)); /* Custom rotational tilt */
            transition: transform 0.3s;
            opacity: 0;
        }
        .polaroid img {
            width: 170px;
            height: 150px;
            object-fit: cover;
            display: block;
            border: 1px solid #ddd;
        }

        /* Neon Glow Effect for Text */
        .neon-glow {
            color: #fff;
            text-shadow: 0 0 5px #fff, 0 0 10px #ff4757, 0 0 20px #ff4757, 0 0 40px #ff4757;
            animation: pulseGlow 2s infinite alternate;
        }
        @keyframes pulseGlow {
            from { text-shadow: 0 0 5px #fff, 0 0 10px #ff4757, 0 0 20px #ff4757, 0 0 30px #ff4757; }
            to { text-shadow: 0 0 10px #fff, 0 0 20px #ff6b81, 0 0 30px #ff6b81, 0 0 50px #ff6b81; }
        }

        /* Burst Particles */
        .particle {
            position: absolute;
            pointer-events: none;
            z-index: 15;
            font-size: 1.5rem;
            animation: burstOut 0.8s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }
        @keyframes burstOut {
            0% { transform: translate(-50%, -50%) scale(0.3); opacity: 1; }
            100% { transform: translate(var(--mx), var(--my)) scale(1.2) rotate(var(--rot)); opacity: 0; }
        }

        /* Snowflake Animation */
        .snowflake {
            position: absolute;
            top: -10px;
            color: #fff;
            pointer-events: none;
            z-index: 5;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(105vh) translateX(30px); }
        }

        /* Generic Animations */
        .pop-in { animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.25) forwards; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.6) rotate(var(--r, 0deg)); } to { opacity: 1; transform: scale(1) rotate(var(--r, 0deg)); } }
